<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consulta RUC</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #1e293b, #0f172a);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.container {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  padding: 30px;
  border-radius: 16px;
  width: 400px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
}

h1 {
  text-align: center;
  margin-bottom: 20px;
  font-weight: 600;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-bottom: 15px;
  outline: none;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #3b82f6;
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #2563eb;
}

.resultado {
  margin-top: 20px;
  padding: 15px;
  border-radius: 10px;
  background: rgba(255,255,255,0.08);
}

.label {
  font-size: 12px;
  color: #94a3b8;
}

.valor {
  font-size: 16px;
  margin-bottom: 10px;
}

.loading {
  text-align: center;
  font-size: 14px;
}
</style>

</head>
<body>

<div class="container">
  <h1>Consulta RUC</h1>

  <input type="text" id="ruc" placeholder="Ingrese el RUC" onkeyup="if(event.key==='Enter') buscar()">
  <button onclick="buscar()">Consultar</button>

  <div id="resultado"></div>
</div>

<script>
async function buscar() {
  const ruc = document.getElementById("ruc").value;
  const div = document.getElementById("resultado");

  if (!ruc) {
    div.innerHTML = "<div class='loading'>Ingrese un RUC</div>";
    return;
  }

  div.innerHTML = "<div class='loading'>Consultando...</div>";

  try {
    const res = await fetch(
      `https://fordyszrqqrjwhgvrohh.supabase.co/rest/v1/contribuyentes?ruc=eq.${ruc}`,
      {
        headers: {
          "apikey": "sb_publishable_kuS6mWVWW6KRWJ_tvS1L7A_6g5jwTvz",
          "Authorization": "Bearer sb_publishable_kuS6mWVWW6KRWJ_tvS1L7A_6g5jwTvz"
        }
      }
    );

    const data = await res.json();

    if (data.length > 0) {
      const c = data[0];

      div.innerHTML = `
        <div class="resultado">
          <div class="label">RUC</div>
          <div class="valor">${c.ruc}</div>

          <div class="label">Razón Social</div>
          <div class="valor">${c.razon_social}</div>

          <div class="label">Agente de Retención</div>
          <div class="valor">${c.agente_retencion}</div>

          <div class="label">Contribuyente Especial</div>
          <div class="valor">${c.especial}</div>
        </div>
      `;
    } else {
      div.innerHTML = "<div class='resultado'>❌ No encontrado</div>";
    }

  } catch (error) {
    div.innerHTML = "<div class='resultado'>⚠️ Error en la consulta</div>";
  }
}
</script>

</body>
</html>

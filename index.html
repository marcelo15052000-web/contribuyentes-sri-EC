<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Contribia</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 15px;
      width: 420px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
      color: #333;
    }

    input {
      width: 85%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      margin-bottom: 15px;
      font-size: 16px;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      background: #667eea;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #5a67d8;
    }

    .card {
      background: #f4f6fb;
      padding: 15px;
      border-radius: 10px;
      margin-top: 20px;
      text-align: left;
      font-size: 14px;
    }

    .activo {
      color: green;
      font-weight: bold;
    }

    .inactivo {
      color: red;
      font-weight: bold;
    }

    .error {
      color: red;
      margin-top: 15px;
    }

  </style>
</head>

<body>

<div class="container">
  <h5> Contribuyentes Especiales y Agentes de Retención.</h5>
  <h1>🔎 Consulta RUC</h1>

  <input type="text" id="ruc" placeholder="Ingresa el RUC">
  <br>
  <button onclick="buscarRUC()">Consultar</button>

  <div id="resultado"></div>
</div>

<script>
  const SUPABASE_URL = "https://fordyszrqqrjwhgvrohh.supabase.co";
  const API_KEY = "sb_publishable_kuS6mWVWW6KRWJ_tvS1L7A_6g5jwTvz";

  async function buscarRUC() {
    const ruc = document.getElementById("ruc").value.trim();
    const resultado = document.getElementById("resultado");

    if (!ruc) {
      resultado.innerHTML = "<p class='error'>⚠️ Ingresa un RUC</p>";
      return;
    }

    resultado.innerHTML = "⏳ Buscando...";

    try {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/contribuyentes?NUMERO_RUC=eq.${ruc}`,
        {
          headers: {
            "apikey": API_KEY,
            "Authorization": "Bearer " + API_KEY
          }
        }
      );

      const data = await res.json();

      if (!data.length) {
        resultado.innerHTML = "<p class='error'>❌ No encontrado</p>";
        return;
      }

      const c = data[0];

      const estadoClass = c.ESTADO_CONTRIBUYENTE === "ACTIVO" ? "activo" : "inactivo";

      resultado.innerHTML = `
        <div class="card">
          <strong>RUC:</strong> ${c.NUMERO_RUC} <br>
          <strong>Razón Social:</strong> ${c.RAZON_SOCIAL} <br>
          <strong>Tipo:</strong> ${c.TIPO_CONTRIBUYENTE} <br>
          <strong>Estado:</strong> <span class="${estadoClass}">${c.ESTADO_CONTRIBUYENTE}</span> <br>
          <strong>Actividad:</strong> ${c.ACTIVIDAD_ECONOMICA} <br>
          <strong>Obligado a llevar contabilidad:</strong> ${c.OBLIGADO === "S" ? "Sí" : "No"} <br>
          <strong>Agente de Retención:</strong> ${c.AGENTE_RETENCION === "S" ? "Sí" : "No"} <br>
          <strong>Contribuyente Especial:</strong> ${c.ESPECIAL === "S" ? "Sí" : "No"}
        </div>
      `;

    } catch (error) {
      resultado.innerHTML = "<p class='error'>⚠️ Error al consultar</p>";
      console.error(error);
    }
  }

  // Buscar con Enter 🔥
  document.getElementById("ruc").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
      buscarRUC();
    }
  });
</script>

</body>
</html>

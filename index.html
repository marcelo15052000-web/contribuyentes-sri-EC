<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Contribia</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.container {
  background: white;
  padding: 25px;
  border-radius: 15px;
  width: 450px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.tabs {
  display: flex;
  margin-bottom: 15px;
}

.tab {
  flex: 1;
  padding: 10px;
  cursor: pointer;
  border-radius: 10px;
  text-align: center;
  background: #eee;
  margin-right: 5px;
}

.tab.active {
  background: #667eea;
  color: white;
}

.content {
  display: none;
}

.content.active {
  display: block;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ccc;
  margin-bottom: 10px;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #667eea;
  color: white;
  cursor: pointer;
}

.card {
  background: #f4f6fb;
  padding: 12px;
  border-radius: 10px;
  margin-top: 15px;
  font-size: 14px;
}

.badge {
  display: inline-block;
  padding: 3px 8px;
  border-radius: 8px;
  font-size: 12px;
  margin-right: 5px;
}

.badge-green {
  background: #d4edda;
  color: #155724;
}

.badge-yellow {
  background: #fff3cd;
  color: #856404;
}

.error {
  color: red;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

  <div class="tabs">
    <div class="tab active" onclick="cambiarTab(0)">🔎 Consulta RUC</div>
    <div class="tab" onclick="cambiarTab(1)">⭐ Grandes Contribuyentes</div>
  </div>

  <!-- TAB 1 -->
  <div class="content active">
    <input type="text" id="ruc" placeholder="Ingresa el RUC">
    <button onclick="buscarRUC()">Consultar</button>
    <div id="resultado"></div>
  </div>

  <!-- TAB 2 -->
  <div class="content">
    <input type="text" id="buscarGC" placeholder="Buscar RUC o nombre">
    <button onclick="buscarGC()">Buscar</button>
    <div id="resultadoGC"></div>
  </div>

</div>

<script>
  const SUPABASE_URL = "https://fordyszrqqrjwhgvrohh.supabase.co";
  const API_KEY = "sb_publishable_kuS6mWVWW6KRWJ_tvS1L7A_6g5jwTvz";

let grandesContribuyentes = [];

// 🚀 Cargar JSON
async function cargarJSON() {
  try {
    const res = await fetch("gc.json");
    grandesContribuyentes = await res.json();
    console.log("✅ JSON cargado:", grandesContribuyentes.length);
  } catch (error) {
    console.error("❌ Error JSON", error);
  }
}

cargarJSON();

// Tabs
function cambiarTab(index) {
  document.querySelectorAll(".tab").forEach((t,i)=>{
    t.classList.toggle("active", i === index);
  });

  document.querySelectorAll(".content").forEach((c,i)=>{
    c.classList.toggle("active", i === index);
  });
}

// 🔎 CONSULTA SUPABASE + VALIDACIÓN GC
async function buscarRUC() {
  const ruc = document.getElementById("ruc").value.trim();
  const resultado = document.getElementById("resultado");

  if (!ruc) {
    resultado.innerHTML = "<p class='error'>⚠️ Ingresa un RUC</p>";
    return;
  }

  resultado.innerHTML = "⏳ Buscando...";

  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/contribuyentes?NUMERO_RUC=eq.${ruc}`,
      {
        headers: {
          "apikey": API_KEY,
          "Authorization": "Bearer " + API_KEY
        }
      }
    );

    const data = await res.json();

    if (!data.length) {
      resultado.innerHTML = "<p class='error'>❌ No encontrado</p>";
      return;
    }

    const c = data[0];

    // 🔥 Validar si es gran contribuyente
    const esGC = grandesContribuyentes.some(gc => gc.NUMERO_RUC === ruc);

    resultado.innerHTML = `
      <div class="card">
        <strong>${c.RAZON_SOCIAL}</strong><br>
        RUC: ${c.NUMERO_RUC}<br>
        Estado: ${c.ESTADO_CONTRIBUYENTE}<br>
        Tipo: ${c.TIPO_CONTRIBUYENTE}<br>
        <br>
        <span class="badge badge-green">
          Agente Retención: ${c.AGENTE_RETENCION === "S" ? "Sí" : "No"}
        </span>
        <span class="badge badge-yellow">
          Especial: ${c.ESPECIAL === "S" ? "Sí" : "No"}
        </span>
        ${esGC ? `<span class="badge badge-green">⭐ Gran Contribuyente</span>` : ""}
      </div>
    `;

  } catch (error) {
    resultado.innerHTML = "<p class='error'>⚠️ Error al consultar</p>";
    console.error(error);
  }
}

// ⭐ BUSCAR EN JSON
function buscarGC() {
  const texto = document.getElementById("buscarGC").value.toLowerCase();
  const resultado = document.getElementById("resultadoGC");

  const filtrados = grandesContribuyentes.filter(c =>
    c.NUMERO_RUC.includes(texto) ||
    c.RAZON_SOCIAL.toLowerCase().includes(texto)
  );

  if (!filtrados.length) {
    resultado.innerHTML = "<p class='error'>❌ No encontrado</p>";
    return;
  }

  resultado.innerHTML = filtrados.map(c => `
    <div class="card">
      <strong>${c.RAZON_SOCIAL}</strong><br>
      RUC: ${c.NUMERO_RUC}
    </div>
  `).join("");
}

// 🔥 Enter en ambos inputs
document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("ruc").addEventListener("keypress", e => {
    if (e.key === "Enter") buscarRUC();
  });

  document.getElementById("buscarGC").addEventListener("keypress", e => {
    if (e.key === "Enter") buscarGC();
  });
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de RUC - Ecuador</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 20px; background: #f4f7f6; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #3ecf8e; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #36b37a; }
        #resultado { margin-top: 20px; padding: 15px; border-top: 1px solid #eee; display: none; }
        .error { color: red; margin-top: 10px; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="card">
    <h2>Buscador de RUC</h2>
    <p>Ingresa el número de RUC para consultar los datos:</p>
    <input type="number" id="rucInput" placeholder="Ej: 190166953001">
    <button onclick="buscarRUC()">Consultar Ahora</button>

    <div id="loading" style="display:none;">Buscando...</div>
    <div id="errorMsg" class="error"></div>

    <div id="resultado">
        <strong>Razón Social:</strong> <span id="resRazon"></span><br><br>
        <strong>Estado:</strong> <span id="resEstado"></span><br><br>
        <strong>Actividad:</strong> <span id="resActividad"></span><br><br>
        <strong>Obligado Contabilidad:</strong> <span id="resObligado"></span>
    </div>
</div>

<script>
    // 1. CONFIGURACIÓN (Reemplaza con tus datos de Supabase)
    const SUPABASE_URL = 'TU_PROJECT_URL_AQUI';
    const SUPABASE_KEY = 'TU_API_KEY_ANON_AQUI';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function buscarRUC() {
        const ruc = document.getElementById('rucInput').value;
        const resDiv = document.getElementById('resultado');
        const errorMsg = document.getElementById('errorMsg');
        
        // Limpiar estados previos
        resDiv.style.display = 'none';
        errorMsg.innerText = '';
        
        if (!ruc) return;

        try {
            // 2. LA CONSULTA
            const { data, error } = await supabase
                .from('padron_ruc') // Nombre de tu tabla
                .select('*')
                .eq('NUMERO_RUC', ruc) // Buscamos por la columna RUC
                .single();

            if (error) throw error;

            if (data) {
                document.getElementById('resRazon').innerText = data.RAZON_SOCIAL;
                document.getElementById('resEstado').innerText = data.ESTADO_CONTRIBUYENTE;
                document.getElementById('resActividad').innerText = data.ACTIVIDAD_ECONOMICA;
                document.getElementById('resObligado').innerText = data.OBLIGADO;
                resDiv.style.display = 'block';
            } else {
                errorMsg.innerText = 'RUC no encontrado.';
            }
        } catch (err) {
            console.error(err);
            errorMsg.innerText = 'Error al consultar. Verifica el número.';
        }
    }
</script>
</body>
</html>
